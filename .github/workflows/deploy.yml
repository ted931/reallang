name: Deploy to Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 13.125.33.79
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          known_hosts: |
            [13.125.33.79]:2222 ssh-rsa 
            [13.125.33.79]:2222 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBHhEMJlA8ZRi7c7Vt74iGSgq5edihqNsEsxsf14PzFdAqueqHzc4iqM73wR0fWBW0K8dERKBFxbdjZ4rr4zsYto=
            [13.125.33.79]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICRCFg7d8CqXWcE9LJNPcJt3Ia7qCU715NBsL+qODy8x
          script: |
            set -e
            cd /home/ubuntu/reallang
            git pull origin main

            # 루트 포털 변경 시 재빌드
            ROOT_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^src/" | head -1)
            if [ -n "$ROOT_CHANGED" ]; then
              npm run build && pm2 restart portal
            fi

            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "^projects/" | cut -d/ -f2 | sort -u)

            for proj in $CHANGED; do
              case $proj in
                # 통합 서비스
                jeju-travel) npm run build:jeju-travel && pm2 restart jeju-travel ;;
                jeju-car) npm run build:jeju-car && pm2 restart jeju-car ;;
                jeju-biz) npm run build:jeju-biz && pm2 restart jeju-biz ;;
                # 제주 서비스
                jejupass-promo) npm run build:jejupass && pm2 restart jejupass ;;
                jeju-weather) npm run build:weather && pm2 restart weather ;;
                jeju-map) npm run build:map && pm2 restart map ;;
                jeju-travel-planner) npm run build:travel && pm2 restart travel-planner ;;
                jeju-course-maker) npm run build:course && pm2 restart course-maker ;;
                jeju-party) npm run build:party && pm2 restart party ;;
                # 렌터카 서비스
                car-pick) npm run build:car-pick && pm2 restart car-pick ;;
                weather-drive) npm run build:weather-drive && pm2 restart weather-drive ;;
                smart-fuel) npm run build:smart-fuel && pm2 restart smart-fuel ;;
                # 도구 & 내부
                mini-xd) npm run build:mini-xd && pm2 restart mini-xd ;;
                creative-sandbox) npm run build:sandbox && pm2 restart sandbox ;;
                dashboard) npm run build:dashboard && pm2 restart dashboard ;;
                cs-chatbot) npm run build:chatbot && pm2 restart chatbot ;;
                # 피싱로그
                fishing) npm run build:fishing && pm2 restart fishing ;;
                # 여행 성향 추천
                travel-pick) npm run build:travel-pick && pm2 restart travel-pick ;;
                # 렌터카 가성비 리포트
                car-report) npm run build:car-report && pm2 restart car-report ;;
                # 콘텐츠 스튜디오
                content-studio) npm run build:content-studio && pm2 restart content-studio ;;
                # 공통 모듈 변경 시 전체 재빌드
                common) pm2 restart all ;;
              esac
            done

            if [ -z "$CHANGED" ]; then
              pm2 restart all
            fi

            pm2 save
