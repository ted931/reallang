# Nginx 설정 — realang.store 리버스 프록시
# 위치: /etc/nginx/sites-available/reallang
# 적용: sudo ln -sf /etc/nginx/sites-available/reallang /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name realang.store www.realang.store;
    return 301 https://$host$request_uri;
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name realang.store www.realang.store;

    ssl_certificate /etc/letsencrypt/live/realang.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realang.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 메인 포탈 (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 제주패스 프로모션 (port 3001)
    location /jejupass/ {
        proxy_pass http://127.0.0.1:3001/jejupass/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mini XD (port 3002)
    location /mini-xd/ {
        proxy_pass http://127.0.0.1:3002/mini-xd/;
