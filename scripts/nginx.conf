# Nginx 설정 — realang.store 리버스 프록시
# 위치: /etc/nginx/sites-available/reallang
# 적용: sudo cp scripts/nginx.conf /etc/nginx/sites-available/reallang
#       sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name realang.store www.realang.store;
    return 301 https://$host$request_uri;
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name realang.store www.realang.store;

    ssl_certificate /etc/letsencrypt/live/realang.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realang.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 공통 프록시 헤더
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # ── 통합 서비스 (TOP) ──
    location /travel { proxy_pass http://127.0.0.1:3020; }
    location /car    { proxy_pass http://127.0.0.1:3021; }
    location /biz    { proxy_pass http://127.0.0.1:3022; }

    # ── 제주 서비스 (프로토타입) ──
    location /jejupass       { proxy_pass http://127.0.0.1:3001; }
    location /weather        { proxy_pass http://127.0.0.1:3004; }
    location /map            { proxy_pass http://127.0.0.1:3005; }
    location /travel-planner { proxy_pass http://127.0.0.1:3006; }
    location /course         { proxy_pass http://127.0.0.1:3007; }
    location /party          { proxy_pass http://127.0.0.1:3010; }

    # ── 렌터카 서비스 (프로토타입) ──
    location /car-pick      { proxy_pass http://127.0.0.1:3011; }
    location /weather-drive { proxy_pass http://127.0.0.1:3012; }
    location /smart-fuel    { proxy_pass http://127.0.0.1:3013; }

    # ── 도구 & 내부 ──
    location /mini-xd   { proxy_pass http://127.0.0.1:3002; }
    location /sandbox   { proxy_pass http://127.0.0.1:3003; }
    location /dashboard { proxy_pass http://127.0.0.1:3008; }
    location /chatbot   { proxy_pass http://127.0.0.1:3009; }

    # ── 메인 포탈 (fallback) ──
    location / { proxy_pass http://127.0.0.1:3000; }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
